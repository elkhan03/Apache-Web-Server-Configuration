<VirtualHost *:80>
	ServerName project.local
	Redirect permanent / https://project.local/
</VirtualHost>
	
<VirtualHost *:443>
	ServerName project.local 
	DocumentRoot /web/project

    <Directory /web/project>
        Require all granted
        Options -Indexes
        AllowOverride All
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/httpd/ssl/project.crt
    SSLCertificateKeyFile /etc/httpd/ssl/project.key

    ErrorLog /var/log/httpd/project-error.log
    CustomLog /var/log/httpd/project-access.log combined

</VirtualHost>
